<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>個人記帳工具</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div id="app">
      <div id="login-screen" class="screen">
        <div class="login-card">
          <h1>記帳工具</h1>
          <p>請使用 Google 帳號登入以同步您的試算表</p>
          <button id="login-btn" class="primary-btn">Google 登入</button>
        </div>
      </div>

      <div id="main-screen" class="screen hidden">
        <header>
          <h2>我的帳務總覽</h2>
          <div class="header-actions">
            <button id="settings-btn" class="text-btn">管理欄位</button>
            <button id="logout-btn" class="text-btn">登出</button>
          </div>
        </header>

        <div class="main-layout">
          <aside class="left-column">
            <section class="card form-section">
              <h3
                style="
                  color: var(--primary-color);
                  border-left: 4px solid var(--primary-color);
                  padding-left: 10px;
                "
              >
                新增收支
              </h3>
              <form id="record-form">
                <div class="form-grid">
                  <div class="form-group">
                    <label>日期</label
                    ><input type="date" id="input-date" required />
                  </div>
                  <div class="form-group">
                    <label>收支類型</label>
                    <select id="input-type" required>
                      <option value="支出">支出</option>
                      <option value="收入">收入</option>
                      <option value="轉帳">轉帳</option>
                    </select>
                  </div>
                  <div class="form-group hidden" id="transfer-target-group">
                    <label>轉入帳戶</label
                    ><select id="input-transfer-target"></select>
                  </div>
                  <div class="form-group" id="category-group">
                    <label>分類</label
                    ><select id="input-category" required></select>
                  </div>
                  <div class="form-group">
                    <label>金額</label
                    ><input type="number" id="input-amount" min="1" required />
                  </div>
                  <div class="form-group">
                    <label>支付方式</label>
                    <select id="input-method" required>
                      <option value="現金">現金</option>
                      <option value="銀行帳戶">銀行帳戶</option>
                      <option value="信用卡">信用卡</option>
                      <option value="電子支付">電子支付</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label id="payment-label">帳戶/卡片</label
                    ><select id="input-payment" required></select>
                  </div>
                  <div class="form-group">
                    <label>說明</label
                    ><textarea
                      id="input-desc"
                      placeholder="例如：早餐店蛋餅大冰奶"
                      required
                      rows="3"
                      style="
                        width: 100%;
                        padding: 12px;
                        border: 1px solid #d1d5db;
                        border-radius: 10px;
                        background: #f9fafb;
                        resize: vertical;
                      "
                    ></textarea>
                  </div>
                </div>
                <button
                  type="submit"
                  id="submit-btn"
                  class="primary-btn submit-btn"
                  style="margin-top: 10px"
                >
                  儲存這筆帳目
                </button>
              </form>
            </section>
          </aside>

          <main class="right-column">
            <section class="card summary-section">
              <div class="chart-header" style="margin-bottom: 10px">
                <h3 style="margin: 0">總覽</h3>
                <div style="display: flex; align-items: center; gap: 10px">
                  <span style="font-size: 14px; color: var(--text-muted)"
                    >選擇月份：</span
                  >
                  <input
                    type="month"
                    id="main-month-filter"
                    class="month-picker"
                  />
                </div>
              </div>
              <div class="summary-cards">
                <div class="summary-card income">
                  <div class="title">收入</div>
                  <div class="value" id="summary-income">$0</div>
                </div>
                <div class="summary-card expense">
                  <div class="title">支出</div>
                  <div class="value" id="summary-expense">$0</div>
                </div>
                <div class="summary-card net">
                  <div class="title">結餘</div>
                  <div class="value" id="summary-net">$0</div>
                </div>
              </div>
            </section>

            <section class="card chart-section">
              <div class="chart-header">
                <h3>
                  類別
                  <span class="subtitle" style="margin-left: 0"
                    >(點擊圖表可看明細)</span
                  >
                </h3>
                <div class="toggle-group">
                  <button id="toggle-expense" class="toggle-btn active">
                    支出
                  </button>
                  <button id="toggle-income" class="toggle-btn">收入</button>
                </div>
              </div>
              <div class="chart-container">
                <canvas id="expense-chart"></canvas>
              </div>
            </section>

            <section class="card history-section">
              <h3>帳務明細</h3>
              <div
                style="
                  display: flex;
                  padding: 10px 0;
                  border-bottom: 2px solid #e5e7eb;
                  color: var(--text-muted);
                  font-size: 14px;
                  font-weight: bold;
                "
              >
                <div style="flex: 1.5">日期</div>
                <div style="flex: 1.5">分類</div>
                <div style="flex: 2">說明</div>
                <div style="flex: 1.5; text-align: right">金額</div>
                <div style="flex: 2; text-align: right; padding-right: 10px">
                  支付方式
                </div>
              </div>
              <div
                id="main-transaction-list"
                class="transaction-list"
                style="padding: 0; max-height: 400px"
              ></div>
            </section>

            <section class="card balance-section">
              <h3>
                帳戶餘額
                <span class="subtitle">(包含期初餘額，點擊可看歷史明細)</span>
              </h3>
              <div id="balance-container"></div>
            </section>
          </main>
        </div>
      </div>
    </div>

    <div id="details-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h3 id="modal-title" style="margin-bottom: 5px">明細</h3>
            <input
              type="month"
              id="details-month-filter"
              class="month-picker"
            />
          </div>
          <span class="close-btn" id="close-modal">&times;</span>
        </div>
        <div id="modal-body" class="transaction-list"></div>
      </div>
    </div>

    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>編輯紀錄</h3>
          <span class="close-btn" id="close-edit-modal">&times;</span>
        </div>
        <form id="edit-form" style="padding: 20px; overflow-y: auto">
          <input type="hidden" id="edit-row-id" /><input
            type="hidden"
            id="edit-timestamp"
          />
          <div class="form-grid">
            <div class="form-group">
              <label>日期</label><input type="date" id="edit-date" required />
            </div>
            <div class="form-group">
              <label>類型</label
              ><select id="edit-type" required>
                <option value="支出">支出</option>
                <option value="收入">收入</option>
              </select>
            </div>
            <div class="form-group">
              <label>分類</label
              ><select id="edit-category" required></select>
            </div>
            <div class="form-group">
              <label>金額</label
              ><input type="number" id="edit-amount" min="1" required />
            </div>
            <div class="form-group">
              <label>支付/收款方式</label>
              <select id="edit-method" required>
                <option value="現金">現金</option>
                <option value="銀行帳戶">銀行帳戶</option>
                <option value="信用卡">信用卡</option>
                <option value="電子支付">電子支付</option>
              </select>
            </div>
            <div class="form-group">
              <label>帳戶/卡片</label
              ><select id="edit-payment" required></select>
            </div>
            <div class="form-group full-width">
              <label>說明</label><input type="text" id="edit-desc" required />
            </div>
          </div>
          <button type="submit" class="primary-btn submit-btn">更新紀錄</button>
        </form>
      </div>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content" style="max-width: 650px">
        <div class="modal-header">
          <h3>管理欄位 (Category / Payment)</h3>
          <span class="close-btn" id="close-settings-modal">&times;</span>
        </div>
        <div class="settings-body">
          <div class="settings-col">
            <h4>分類 (Category)</h4>
            <div class="add-input-group">
              <input
                type="text"
                id="new-category-input"
                placeholder="新增分類"
              />
              <button id="add-category-btn" class="small-btn">新增</button>
            </div>
            <ul id="settings-category-list" class="settings-list"></ul>
          </div>
          <div class="settings-col">
            <h4>帳戶 (Payment)</h4>
            <div class="add-input-group">
              <select
                id="new-payment-method"
                style="
                  flex: 1.5;
                  padding: 8px;
                  border-radius: 8px;
                  border: 1px solid #d1d5db;
                "
              >
                <option value="現金">現金</option>
                <option value="銀行帳戶">銀行帳戶</option>
                <option value="信用卡">信用卡</option>
                <option value="電子支付">電子支付</option>
              </select>
              <input
                type="text"
                id="new-payment-input"
                placeholder="帳戶名稱"
                style="flex: 2"
              />
              <input
                type="number"
                id="new-payment-initial"
                placeholder="期初餘額"
                value="0"
                style="flex: 1.2"
              />
              <button id="add-payment-btn" class="small-btn">新增</button>
            </div>
            <ul id="settings-payment-list" class="settings-list"></ul>
          </div>
        </div>
        <div class="modal-footer">
          <button id="save-settings-btn" class="primary-btn">
            儲存至試算表
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
